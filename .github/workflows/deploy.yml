name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Deploy to EC2
      uses: appleboy/ssh-action@v1.0.3
      env:
        GH_TOKEN: ${{ github.token }}
        REPO: ${{ github.repository }}
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        envs: GH_TOKEN,REPO
        script_stop: true
        script: |
          cd ~/tumai-makeathon-2026

          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git"
          git fetch origin
          git reset --hard origin/main
          git remote set-url origin "https://github.com/${REPO}.git"

          # Stop the current stack (also removes orphans from this project).
          docker compose down --remove-orphans

          # Tear down any stale containers from previous deploy layouts
          # (e.g. the old backend/docker-compose.yml project named "backend").
          for project in backend; do
            stale=$(docker ps -aq --filter "label=com.docker.compose.project=${project}")
            if [ -n "$stale" ]; then
              docker rm -f $stale
            fi
          done

          docker compose up -d --build

          docker image prune -f