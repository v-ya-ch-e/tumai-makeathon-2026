services:
  backend:
    build: ./backend
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - wg_data:/root/.wg_hunter
    expose:
      - "8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_GOOGLE_MAPS_API_KEY: ${VITE_GOOGLE_MAPS_API_KEY:-}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./fullchain.crt:/etc/nginx/certs/fullchain.crt:ro
      - ./privkey.key:/etc/nginx/certs/privkey.key:ro
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  wg_data:
