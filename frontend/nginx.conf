# Redirect all plain HTTP traffic to HTTPS.
server {
    listen 80;
    server_name doubleu.team www.doubleu.team;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name doubleu.team www.doubleu.team;

    ssl_certificate     /etc/nginx/certs/fullchain.crt;
    ssl_certificate_key /etc/nginx/certs/privkey.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 10m;

    # FastAPI backend: JSON, SSE, health checks, Swagger UI.
    location ~ ^/(api|docs|redoc|openapi\.json|health)(/|$) {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE: disable buffering and let connections stay open.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
    }

    # SPA: serve built assets, fall back to index.html for client-side routing.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
